name: Build Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional existing release tag to attach artifacts to'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build macOS app
        run: npm run dist:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-context-proxy-macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap

  build-windows:
    name: Windows package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-context-proxy-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml

  release:
    name: Attach artifacts to GitHub release
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: codex-context-proxy-*
          merge-multiple: true

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          body: |
            大重构更新。

            Updates:
            - Refactor the backend proxy architecture around the FastAPI proxy entry.
            - Unify frontend and backend transcript/context contracts.
            - Split proxy storage, SSE, session id, and item registry responsibilities into dedicated modules.
            - Expand frontend contract and backend proxy core tests for the rebuilt protocol paths.
            - Update packaging so shared modules are included in release installers.
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.zip
            release-artifacts/*.exe
            release-artifacts/*.blockmap
            release-artifacts/*.yml
